services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: etl
      POSTGRES_PASSWORD: etl
      POSTGRES_DB: weather
    ports:
      - "5432:5432"
    volumes:
      - etl-db-volume:/var/lib/postgresql/data
    networks:
      - networkName

networks:
  networkName:
    name: networkName

volumes:
  etl-db-volume: